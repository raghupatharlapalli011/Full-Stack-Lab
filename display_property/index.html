<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display Property Demo</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CSS Display Property Examples</h1>

    <!-- BLOCK -->
    <section>

        <h2>1. display: block</h2>

        <div class="block">Apple</div>
        <div class="block">Mango</div>
        <div class="block">Banana</div>

    </section>


    <!-- INLINE -->

    <section>

        <h2>2. display: inline</h2>

        <span class="inline">HTML</span>
        <span class="inline">CSS</span>
        <span class="inline">JavaScript</span>

    </section>


    <!-- INLINE BLOCK -->

    <section>

        <h2>3. display: inline-block</h2>

        <div class="inline-block">Home</div>
        <div class="inline-block">About</div>
        <div class="inline-block">Contact</div>

    </section>


    <!-- NONE -->

    <section>

        <h2>4. display: none</h2>

        <p>This paragraph is visible.</p>

        <p class="hidden">
            You should never see me.
        </p>

    </section>


    <!-- FLEX -->

    <section>

        <h2>5. display: flex</h2>

        <div class="flex-container">

            <div class="box">1</div>

            <div class="box">2</div>

            <div class="box">3</div>

            <div class="box">4</div>

        </div>

    </section>


    <!-- GRID -->

    <section>

        <h2>6. display: grid</h2>

        <div class="grid-container">

            <div class="grid-box">A</div>

            <div class="grid-box">B</div>

            <div class="grid-box">C</div>

            <div class="grid-box">D</div>

            <div class="grid-box">E</div>

            <div class="grid-box">F</div>

        </div>

    </section>

</body>
</html>
